server {
  listen 80;
  server_name phapmontamlinh-quantheambotat.vn www.phapmontamlinh-quantheambotat.vn;

  resolver 127.0.0.11 valid=30s;

  # Prevent browsers from caching HTTPS-only behavior until TLS is configured (port 443 + cert).
  proxy_hide_header Strict-Transport-Security;

  # Let's Encrypt HTTP-01 challenge (certbot webroot)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /admin/ { return 301 /admin; }

  location ^~ /api/ {
    proxy_pass http://backend:1337;
    proxy_http_version 1.1;
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
  }

  location ^~ /admin {
    proxy_pass http://backend:1337;
    proxy_http_version 1.1;
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
  }

  location / {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    include /etc/nginx/conf.d/snippets/proxy-common.conf;
  }
}
