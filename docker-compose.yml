version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pmtl-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi_db}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-strapi_user}"]
    networks:
      - pmtl-network

  backend:
    build:
      context: ./BE_PMTL
      dockerfile: Dockerfile
    container_name: pmtl-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=384
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_NAME: ${DATABASE_NAME:-strapi_db}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change_me}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
    ports:
      - "1337:1337"
    volumes:
      - ./BE_PMTL/public/uploads:/app/public/uploads
    networks:
      - pmtl-network

  frontend:
    build:
      context: ./fe-pmtl
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: pmtl-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "3000:3000"
    networks:
      - pmtl-network

  nginx:
    image: nginx:alpine
    container_name: pmtl-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - pmtl-network

volumes:
  postgres_data:
networks:
  pmtl-network:
    driver: bridge
